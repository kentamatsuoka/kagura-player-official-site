name: Deploy Kagura Player site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_SITE_ORIGIN: https://kentamatsuoka.github.io
          PUBLIC_BASE_PATH: /kagura-player-official-site
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          PUBLIC_MONTHLY_CHECKOUT_URL: ${{ vars.PUBLIC_MONTHLY_CHECKOUT_URL }}
          PUBLIC_ANNUAL_CHECKOUT_URL: ${{ vars.PUBLIC_ANNUAL_CHECKOUT_URL }}
        run: npm run build

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
